name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # create GitHub release
  id-token: write   # Sigstore keyless signing via OIDC

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Add-Type -AssemblyName System.Drawing
          $img = [System.Drawing.Image]::FromFile((Resolve-Path 'assets\logo.png').Path)
          $bmp = New-Object System.Drawing.Bitmap($img, 32, 32)
          $ico = [System.Drawing.Icon]::FromHandle($bmp.GetHicon())
          $fs  = New-Object System.IO.FileStream('assets\logo.ico',[System.IO.FileMode]::Create)
          $ico.Save($fs); $fs.Close(); $ico.Dispose(); $bmp.Dispose(); $img.Dispose()
          go install github.com/akavel/rsrc@latest
          rsrc -manifest app.manifest -ico assets\logo.ico -o rsrc.syso
          go build -ldflags="-H=windowsgui -s -w" -o dist\BgStatsCompanion.exe .

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      # Sigstore keyless signing — provides a public, verifiable supply-chain
      # attestation (no key management needed, uses GitHub Actions OIDC).
      - name: Sign binary (Sigstore)
        working-directory: dist
        shell: bash
        run: |
          cosign sign-blob --yes \
            --bundle BgStatsCompanion.exe.bundle \
            BgStatsCompanion.exe

      - name: Create GitHub Release
        id: release
        uses: softprops/action-gh-release@v2
        with:
          name: "BgStats Companion ${{ github.ref_name }}"
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: |
            dist/BgStatsCompanion.exe
            dist/BgStatsCompanion.exe.bundle

  winget:
    needs: release
    runs-on: windows-latest
    # Only submit stable releases (no pre-release tags like v1.0.0-beta.1)
    if: ${{ !contains(github.ref_name, '-') }}

    steps:
      # ---------------------------------------------------------------------------
      # Submits a PR to microsoft/winget-pkgs automatically after each release.
      # wingetcreate picks up the .exe URL from the GitHub release assets.
      #
      # First-time setup:
      #   1. Package identifier: mvpoftheleague.BgStatsCompanion
      #   2. Submit the initial manifest manually:
      #        wingetcreate new https://github.com/mvpoftheleague/<repo>/releases/download/v1.0.0/BgStatsCompanion.exe
      #      Fill in the prompts, then open the PR against microsoft/winget-pkgs.
      #      Once merged, subsequent releases are handled automatically by this job.
      #   3. Add a GitHub secret WINGET_TOKEN — a classic PAT with public_repo scope
      #      (needs to fork and PR microsoft/winget-pkgs on your behalf).
      # ---------------------------------------------------------------------------
      - name: Submit to winget
        shell: pwsh
        env:
          WINGET_TOKEN: ${{ secrets.WINGET_TOKEN }}
        run: |
          iwr https://aka.ms/wingetcreate/latest -OutFile wingetcreate.exe
          .\wingetcreate.exe update `
            --version "${{ github.ref_name }}" `
            --urls "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/BgStatsCompanion.exe" `
            --submit `
            --token "$env:WINGET_TOKEN" `
            "mvpoftheleague.BgStatsCompanion"
